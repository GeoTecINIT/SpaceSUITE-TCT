<div class="flex flex-column align-items-center justify-content-center p-4">
    <h2>Create New Material</h2>
    <p-stepper [value]="1" [linear]="true" class="custom-stepper">
        <p-step-list>
            <p-step [value]="1">General Information</p-step>
            <p-step [value]="2">Material Content</p-step>
            <p-step [value]="3">Additional Information</p-step>
            <p-step [value]="4">User Information</p-step>
        </p-step-list>
        <p-step-panels>
            <p-step-panel [value]="1">
                <ng-template #content let-activateCallback="activateCallback">
                    <div class="flex flex-column gap-3">
                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <input pInputText id="title" autocomplete="off" class="w-full custom-input" [(ngModel)]="material.title"/>
                                <p-inputicon class="pi pi-pencil" />
                            </p-iconfield>
                            <label for="title">Title *</label>
                        </p-floatlabel>
    
                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <input pInputText id="publisher" autocomplete="off" class="w-full custom-input" [(ngModel)]="material.publisher"/>
                                <p-inputicon class="pi pi-building-columns" />
                            </p-iconfield>
                            <label for="publisher">Publisher *</label>
                        </p-floatlabel>
    
                        <p-floatlabel variant="on" class="w-full custom-floatlabel">
                            <p-datepicker inputId="created" showIcon iconDisplay="input" dateFormat="dd/mm/yy" 
                                [(ngModel)]="material.created" fluid class="custom-input custom-datepicker"/>
                            <label for="created">Created *</label>
                        </p-floatlabel>
    
                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-select [options]="languageSelector.tags" [(ngModel)]="material.language"  inputId="lang" 
                                class="w-full custom-select" [checkmark]="true"/>
                            <label for="lang">{{languageSelector.label}} *</label>
                        </p-floatlabel>
    
                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <textarea id="description" pTextarea [(ngModel)]="material.description" style="resize: none;" 
                                    rows="4" class="w-full custom-textarea"></textarea>
                            <label for="description">Description</label>
                        </p-floatlabel>
    
                        <text-chips [fieldName]="'Author/s'" [(chips)]="material.author"></text-chips>
                    </div>
                    <div class="flex max-w-full flex-wrap mt-3">
                        <p-button class="custom-button ml-auto" label="Next" icon="pi pi-arrow-right" iconPos="right" (onClick)="activateCallback(2)" />
                    </div>
                </ng-template>
            </p-step-panel>
    
            <p-step-panel [value]="2">
                <ng-template #content let-activateCallback="activateCallback">
                    <div class="flex flex-column gap-3">
                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-select [options]="typeSelector.tags" [(ngModel)]="material.type"  inputId="type" 
                                class="w-full custom-select" [checkmark]="true"/>
                            <label for="type">{{typeSelector.label}} *</label>
                        </p-floatlabel>
                        
                        <p-multiselect [options]="formatSelector.tags" [(ngModel)]="material.format"  placeholder="{{formatSelector.label}}" 
                        class="w-full custom-multiselect" [showClear]="true" [maxSelectedLabels]="1"/>

                        <p-multiselect [options]="eqfSelector.tags" [(ngModel)]="material.educationLevel"  placeholder="{{eqfSelector.label}}" 
                        class="w-full custom-multiselect" [showClear]="true" [maxSelectedLabels]="1"/>

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <input pInputText id="audience" autocomplete="off" class="w-full custom-input" [(ngModel)]="material.audience"/>
                                <p-inputicon class="pi pi-users" />
                            </p-iconfield>
                            <label for="audience">Target Audience</label>
                        </p-floatlabel>

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <textarea id="assesment" pTextarea [(ngModel)]="material.assesment" style="resize: none;" 
                                    rows="4" class="w-full custom-textarea"></textarea>
                            <label for="assesment">Type of Assesment</label>
                        </p-floatlabel>

                        <text-chips [fieldName]="'Prerequisites'" [icon]="'pi pi-list-check'" [(chips)]="material.prerequisites"></text-chips>

                        <text-chips [fieldName]="'Learning Outcomes'" [icon]="'pi pi-graduation-cap'" [(chips)]="material.learningOutcomes"></text-chips>

                        <text-chips [fieldName]="'Table of Content'" [icon]="'pi pi-book'" [(chips)]="material.tableOfContents"></text-chips>
                    </div>
                    <div class="flex justify-content-between mt-3">
                        <p-button class="custom-secondary-button" label="Back" severity="secondary" icon="pi pi-arrow-left" (onClick)="activateCallback(1)" />
                        <p-button class="custom-button" label="Next" icon="pi pi-arrow-right" iconPos="right" (onClick)="activateCallback(3)" />
                    </div>
                </ng-template>
            </p-step-panel>
    
            <p-step-panel [value]="3">
                <ng-template #content let-activateCallback="activateCallback">
                    <div class="flex flex-column gap-3">
                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <p-inputnumber id="duration" [min]="0" [useGrouping]="false" suffix=" Hours"
                                    class="w-full custom-input" [(ngModel)]="material.SizeOrDuration"/>
                                <p-inputicon class="pi pi-clock" />
                            </p-iconfield>
                            <label for="duration">Duration *</label>
                        </p-floatlabel>

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-select [options]="licenseSelector.tags" [(ngModel)]="material.license"
                                class="w-full custom-select" [checkmark]="true" inputId="license"/>
                            <label for="license">{{licenseSelector.label}} *</label>
                        </p-floatlabel>

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <input pInputText id="url" autocomplete="off" class="w-full custom-input" [(ngModel)]="material.source"/>
                                <p-inputicon class="pi pi-link" />
                            </p-iconfield>
                            <label for="url">Source *</label>
                        </p-floatlabel>

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <input pInputText id="certification" autocomplete="off" class="w-full custom-input" [(ngModel)]="material.certification" />
                                <p-inputicon class="pi pi-trophy" />
                            </p-iconfield>
                            <label for="certification">Certification</label>
                        </p-floatlabel>

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <input pInputText id="image" autocomplete="off" class="w-full custom-input" [(ngModel)]="material.image" />
                                <p-inputicon class="pi pi-image" />
                            </p-iconfield>
                            <label for="image">Image URL</label>
                        </p-floatlabel>

                        <text-chips [fieldName]="'Subjects'" [icon]="'pi pi-tags'" [(chips)]="material.subject"></text-chips>

                        <div class="custom-border p-2" style="color: #64748b;">
                            <bokModal [(selectedConcepts)]="material.relation"></bokModal>
                        </div>

                    </div>
                    <div class="flex justify-content-between mt-3">
                        <p-button class="custom-secondary-button" label="Back" severity="secondary" icon="pi pi-arrow-left" (onClick)="activateCallback(2)" />
                        <p-button class="custom-button" label="Next" icon="pi pi-arrow-right" iconPos="right" (onClick)="activateCallback(4)" />
                    </div>
                </ng-template>
            </p-step-panel>

            <p-step-panel [value]="4">
                <ng-template #content let-activateCallback="activateCallback">
                    <div class="flex flex-column gap-3">
                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-iconfield>
                                <input pInputText id="user" autocomplete="off" class="w-full custom-input" [ngModel]="getUserName()" disabled/>
                                <p-inputicon class="pi pi-user" />
                            </p-iconfield>
                            <label for="user">User *</label>
                        </p-floatlabel>

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-select inputId="org" [options]="organizationSelector.tags" [(ngModel)]="material.organization" (ngModelChange)="loadDivisions()"
                                class="w-full custom-select" optionLabel="label" optionValue="value" [checkmark]="true"/>
                            <label for="org">{{organizationSelector.label}} *</label>
                        </p-floatlabel>
                        

                        <p-floatlabel variant="on" class="custom-floatlabel">
                            <p-select [options]="divisionSelector.tags" [(ngModel)]="material.division" class="w-full custom-select" 
                                [disabled]="divisionSelector.tags.length == 0" [checkmark]="true" inputId="division"/>
                            <label for="division">{{divisionSelector.label}} *</label>
                        </p-floatlabel>
                        
                    </div>
                    <div class="flex justify-content-between mt-3">
                        <p-button class="custom-secondary-button" label="Back" severity="secondary" icon="pi pi-arrow-left" (onClick)="activateCallback(3)" />
                        <p-button class="custom-button" label="Submit"/>
                    </div>
                </ng-template>
            </p-step-panel>
        </p-step-panels>
    </p-stepper>
</div>
