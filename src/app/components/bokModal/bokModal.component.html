<div class="flex flex-column">
    {{label}}
    <div class="flex align-items-start gap-2 mt-2 flex-wrap">
        <ng-container *ngFor="let concept of selectedConcepts">
            <div [pTooltip]="selectedConceptsTooltip.get(concept)" tooltipPosition="top">
                <p-chip [label]="concept" [removable]="true" [style.background]="selectedConceptsColor.get(concept)" (onRemove)="removeChip(concept)" 
                [style.color]="'var(--primary-color)'" [style]="{'--p-chip-remove-icon-color':'var(--primary-color)', '--p-chip-remove-icon-focus-ring-color':'var(--primary-color)'}"/>
            </div>
        </ng-container>
        <p-button (click)="showDialog()" [rounded]="true" icon="pi pi-plus" class="white-space-nowrap custom-button" [disabled]="disabled"/>
    </div>
</div>

<p-dialog header="Explore BoK" [modal]="true" [(visible)]="visible" [style]="{width: '45rem', height: '52rem', color: 'var(--primary-color)'}" (onShow)="loadComponent()">
    <ng-template #dynamicContainer></ng-template>
    <div class="flex justify-content-between align-items-center">
        <div class="mx-4">{{currentConcept}} : {{currentConceptName}}</div>
        <p-button (click)="addConcept()" label="Add" class="custom-button"/>
    </div>
</p-dialog>
