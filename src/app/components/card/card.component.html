<p-card [style]="{ width: '19rem', height: '27.5rem', overflow: 'auto'}" class="custom-color">
    <ng-template #header>
        <a class="image-container" href="{{isMaterial ? 'material' : 'action'}}/{{trainingItem._id}}" target="_self" (click)="onClickTitle($event)">
            <img src="{{trainingItem.image == '' ? imagePlaceholder : trainingItem.image}}" alt="Image" />
            <div class="overlay"><i class="pi pi-link"></i></div>
        </a>
    </ng-template>
    <ng-template #title>
        <div class="overflow-hidden" style="max-height: 3.25rem;">
            <a class="card-title" href="{{isMaterial ? 'material' : 'action'}}/{{trainingItem._id}}" target="_self" (click)="onClickTitle($event)" 
                [pTooltip]="showTitleTooltip ? trainingItem.title : ''" tooltipPosition="bottom" tooltipStyleClass="large-tooltip" showDelay="100" hideDelay="50">
                <strong #titleRef class="text-overflow-multiline">{{trainingItem.title}}</strong>
            </a>
        </div>
    </ng-template>
    <ng-template #subtitle>
        <div class="text-sm">
            <strong>Created:</strong> {{trainingItem.created?.toLocaleDateString()}}
        </div>
    </ng-template>
    <div #container class="mt-2 h-4rem overflow-hidden">
        <div #subjects class="flex align-items-start align-items-center gap-2 flex-wrap">
            <ng-content *ngFor="let concept of visibleConcepts">
                <div [pTooltip]="selectedConceptsTooltip.get(concept)" tooltipPosition="top" [tooltipStyleClass]="getTooltipClass(selectedConceptsTooltip.get(concept) ?? '')">
                    <p-tag [value]="concept" [rounded]="true" class="white-space-nowrap custom-tag" [style.background]="selectedConceptsColor.get(concept)" (click)="onClickConcept(concept)" />
                </div>
            </ng-content>
            <i *ngIf="overflow" class="pi pi-chevron-circle-down more-tag" (click)="op.toggle($event)"></i>
        </div>
    </div>
    <ng-template #footer>
        <p-divider class="mt-2"/>
        <div class="flex align-items-end gap-2 flex-nowrap white-space-nowrap">
            <div class="text-sm"><strong>{{trainingItem.language ?? 'Undefined'}}</strong></div>
            |
            <div class="text-sm"><strong>EQF: {{trainingItem.educationLevel}}</strong></div>
            <ng-content *ngIf="!trainingItem.isPublic">
            |
            <div class="text-sm flex align-items-center gap-1"><i class="pi pi-eye-slash"></i><strong>Private</strong></div>
            </ng-content> 
            |
            <div #orgRef class="text-sm overflow-hidden text-overflow-ellipsis" tooltipPosition="bottom" tooltipStyleClass="large-tooltip"
                [pTooltip]="showOrgTooltip ? trainingItem.orgName : ''"><strong>{{trainingItem.orgName}}</strong></div>
        </div>
    </ng-template>
</p-card>

<p-popover #op>
    <div class="flex align-items-center gap-2 my-2 flex-wrap max-w-10rem">
        <ng-content *ngFor="let concept of concepts">
            <div [pTooltip]="selectedConceptsTooltip.get(concept)" tooltipPosition="top" [tooltipStyleClass]="getTooltipClass(selectedConceptsTooltip.get(concept) ?? '')">
                <p-tag [value]="concept" [rounded]="true" class="white-space-nowrap custom-tag" [style.background]="selectedConceptsColor.get(concept)" (click)="onClickConcept(concept)" />
            </div>
        </ng-content>
    </div>
</p-popover>
