<p-toast class="custom-toast" position="bottom-right"/>
<div #container class="flex flex-column xl:flex-row gap-5 m-2">
    <filters [(multiSelectOptions)]="filterOptions" [(advancedMultiSelectOptions)]="advancedFilterOptions" [loading]="loading" (multiSelectOptionsChange)="filterTrainingMaterial()" 
        (searchValueChange)="searchTrainingMaterial($event)" class="flex justify-content-center" (bokConceptsChange)="filterByBoKConcept($event)" (advancedMultiSelectOptionsChange)="filterTrainingMaterial()" 
        (filterUserMaterialChange)="filterByUserMaterialChange($event)" [logged]="isLogged()" [selectedOption]="searchOption" (selectedOptionChange)="setSearchOption($event)"></filters>
    <div *ngIf="finalTrainingMaterial.length != 0 || loading" class="flex flex-column w-full justify-content-between">
        <div class="flex gap-5 flex-wrap align-content-start justify-content-center xl:justify-content-start mb-4">
            <ng-container *ngIf="!loading else cardSkeleton">
                <ng-container *ngFor="let material of paginationTrainingMaterial">
                    <card [trainingMaterial]="material"></card>
                </ng-container >
            </ng-container>
        </div>
        <p-paginator (onPageChange)="onPageChange($event)" [first]="first" [rows]="rows" [totalRecords]="finalTrainingMaterial.length" class="custom-paginator"/>
    </div>
    <p *ngIf="finalTrainingMaterial.length == 0 && !loading" class="font-italic flex mx-auto justify-content-center">No material found</p>
</div>
<div class="floating-container flex flex-column gap-2 align-items-end" [ngStyle]="{ bottom: buttonBottom + 'px' }">
    <p-button *ngIf="isLogged() && showButton" (click)="createTrainingMaterial()" icon="pi pi-plus" label="Add Material" class="custom-button floating-button"/>
    <p-buttongroup class="floating-button">
        <p-button (click)="switchSortOrientation()" [icon]="sortAsc ? 'pi pi-sort-amount-up' : 'pi pi-sort-amount-down'" [label]="'Order By ' + selectedSortOption" class="custom-button"/>
        <p-button (click)="menu.toggle($event)" icon="pi pi-chevron-down" class="flex custom-button"/>
    </p-buttongroup>
</div>
<p-menu #menu [model]="sortOptions" popup styleClass="!min-w-fit" class="custom-menu">
    <ng-template #item let-item>
        <a pRipple class="flex items-center p-menu-item-link" (click)="setSortOption(item.label)">
            <i class="w-1rem" [ngClass]="item.label == selectedSortOption ? 'pi pi-check' : ''"></i>
            <span class="ml-2">{{ item.label }}</span>
        </a>
    </ng-template>
</p-menu>

<ng-template #cardSkeleton>
    <ng-content *ngFor="let i of skelletonElements">
        <p-skeleton width="19rem" height="27.5rem" class="custom-skeleton" />
    </ng-content>
</ng-template>
