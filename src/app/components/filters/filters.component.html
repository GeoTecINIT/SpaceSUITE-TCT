<div class="flex flex-column xl:flex-row h-full xl:w-23rem">
    <div class="mx-2">
        <h2>Filters</h2>
        <p-divider class="flex-grow-1"/>
        <div class="my-4">
            <p-selectbutton [(ngModel)]="filterUserMaterial" [options]="filterUserMaterialOptions" class="custom-togglebutton" 
                            optionLabel="label" optionValue="value" (ngModelChange)="updateFilterUserMaterial()" *ngIf="logged">
                <ng-template #item let-item>
                    <div class="row">
                        <i [class]="item.icon"></i>
                        {{item.label}}
                    </div>
                </ng-template>
            </p-selectbutton>
        </div>
        <div class="my-4">
            Search by Title
            <p-iconfield class="mt-1">
                <p-inputicon styleClass="pi pi-search" />
                <input type="text" pInputText [(ngModel)]="searchValue" (ngModelChange)="updateSearchValue()" placeholder="Search" class="w-21rem custom-input" [disabled]="loading"/>
            </p-iconfield>
        </div>
        <ng-container *ngFor="let option of multiSelectOptions">
            <div class="flex flex-column my-4">
                <div class="flex align-items-center">
                    {{option.label}}
                    <i *ngIf="option.tootltip" [pTooltip]="option.tootltip" tooltipPosition="right" class="ml-2 pi pi-info-circle"></i>
                </div>
                <p-multiselect [options]="option.tags" [(ngModel)]="option.selection" (ngModelChange)="updateOptions()" 
                    placeholder="Select {{option.label}}" class="mt-1 w-21rem custom-multiselect" panelStyleClass="max-w-21rem" [disabled]="loading" [showClear]="true"
                    (onClear)="clearOptions(option.label)" [maxSelectedLabels]="1"/>
            </div>
        </ng-container>
        <div class="flex my-4">
            <bokModal class="mt-1" (selectedConceptsChange)="bokConceptsChange.emit($event)" [disabled]="loading" [label]="'Search by BoK Concepts'"></bokModal>
        </div>
    </div>
    <p-divider layout="vertical" class="flex-grow-1 hidden xl:flex"/>
    <p-divider class="flex xl:hidden"/>
</div>
